<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
</head>
<body style="text-align:center; background:pink; font-family:sans-serif;">

<h1>Will you be mine? ❤️</h1>

<button onclick="showLove()">Yes 😍</button>
<button id="noBtn">No 😢</button>

<div id="message" style="display:none;">
  <h2>I knew it ❤️</h2>
  <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" width="250">
</div>

<script>
function showLove() {
  document.getElementById("message").style.display = "block";
}

const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", () => {
  noBtn.style.position = "absolute";
  noBtn.style.left = Math.random()*300 + "px";
  noBtn.style.top = Math.random()*300 + "px";
});
</script>

</body>
</html>

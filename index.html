<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOM NOM MACHINE 😭</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Fredoka',sans-serif;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff4f81,#ff2f6d,#ff8db0);
}

/* FLOATING HEARTS */

.heart{
    position:absolute;
    color:white;
    opacity:0.2;
    animation:float linear infinite;
    user-select:none;
}

@keyframes float{
    from{
        transform:translateY(110vh) rotate(0deg);
    }

    to{
        transform:translateY(-120vh) rotate(360deg);
    }
}

/* MAIN CARD */

.card{
    position:relative;
    width:430px;
    height:670px;
    border-radius:35px;
    overflow:hidden;
    background:rgba(255,255,255,0.12);
    border:2px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(12px);
    box-shadow:0 25px 60px rgba(0,0,0,0.35);
}

/* TITLE */

.title{
    text-align:center;
    color:white;
    font-size:40px;
    margin-top:18px;
    text-shadow:0 5px 12px rgba(0,0,0,0.3);
}

/* PHOTO */

.photo-box{
    position:relative;
    width:350px;
    height:350px;
    margin:25px auto;
    border-radius:30px;
    overflow:hidden;
    border:5px solid white;
    box-shadow:0 18px 35px rgba(0,0,0,0.35);
}

.photo{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* MOUTH */

.mouth{
    position:absolute;
    width:180px;
    height:20px;
    background:black;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    border-radius:0 0 120px 120px;
    overflow:hidden;
    animation:chomp .35s infinite;
    box-shadow:0 8px 18px rgba(0,0,0,0.45);
}

@keyframes chomp{

    0%{
        height:18px;
    }

    50%{
        height:105px;
    }

    100%{
        height:18px;
    }

}

/* TEETH */

.teeth{
    width:100%;
    display:flex;
    justify-content:space-evenly;
}

.tooth{
    width:18px;
    height:18px;
    background:white;
    border-radius:0 0 5px 5px;
}

/* COUNTER */

.counter{
    text-align:center;
    color:white;
    font-size:30px;
    margin-top:10px;
    text-shadow:0 5px 12px rgba(0,0,0,0.3);
}

/* BUTTON */

.controls{
    display:flex;
    justify-content:center;
    margin-top:28px;
}

button{
    border:none;
    background:white;
    color:#ff2f6d;
    padding:16px 30px;
    border-radius:20px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
    box-shadow:0 12px 28px rgba(0,0,0,0.3);
}

button:hover{
    transform:scale(1.08);
}

/* NOM TEXT */

.nom{
    position:absolute;
    color:white;
    font-size:42px;
    font-weight:bold;
    pointer-events:none;
    text-shadow:0 5px 15px rgba(0,0,0,0.3);
    animation:nomFloat 2s linear forwards;
}

@keyframes nomFloat{

    0%{
        opacity:0;
        transform:translateY(0) scale(.5);
    }

    20%{
        opacity:1;
    }

    100%{
        opacity:0;
        transform:translateY(-240px) scale(1.7) rotate(15deg);
    }

}

/* BITE MARKS */

.bite{
    position:absolute;
    width:95px;
    height:95px;
    border-radius:50%;
    background:#ff6f99;
    border:10px solid #ffd5e1;
    animation:bite .45s ease forwards;
}

@keyframes bite{

    0%{
        transform:scale(0);
        opacity:0;
    }

    100%{
        transform:scale(1);
        opacity:1;
    }

}

/* SHAKE */

.shake{
    animation:shake .35s;
}

@keyframes shake{

    0%{transform:translate(0px,0px);}
    25%{transform:translate(6px,-5px);}
    50%{transform:translate(-6px,5px);}
    75%{transform:translate(6px,5px);}
    100%{transform:translate(0px,0px);}

}

</style>
</head>

<body>

<script>

/* HEARTS */

for(let i=0;i<35;i++){

    const h=document.createElement("div");

    h.className="heart";

    h.innerHTML="❤";

    h.style.left=Math.random()*100+"vw";

    h.style.fontSize=(20+Math.random()*45)+"px";

    h.style.animationDuration=(6+Math.random()*10)+"s";

    h.style.animationDelay=Math.random()*5+"s";

    document.body.appendChild(h);
}

</script>

<div class="card" id="card">

    <div class="title">
        NOM NOM MACHINE 😭
    </div>

    <div class="photo-box" id="photoBox">

        <!-- YOUR IMAGE ALREADY ADDED -->

        <img 
        src="https://ibb.co/q3dPZMth"
        class="photo"
        >

        <!-- MOUTH -->

        <div class="mouth">

            <div class="teeth">

                <div class="tooth"></div>
                <div class="tooth"></div>
                <div class="tooth"></div>
                <div class="tooth"></div>
                <div class="tooth"></div>
                <div class="tooth"></div>

            </div>

        </div>

    </div>

    <div class="counter">
        Bites Taken:
        <span id="count">0</span>
    </div>

    <div class="controls">
        <button onclick="eat()">
            START EATING 🍴
        </button>
    </div>

</div>

<!-- NOM NOM AUDIO -->

<audio id="eat1" src="https://assets.mixkit.co/active_storage/sfx/2098/2098-preview.mp3"></audio>

<audio id="eat2" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<script>

let bites=0;

function eat(){

    const card=document.getElementById("card");

    const photoBox=document.getElementById("photoBox");

    const eat1=document.getElementById("eat1");

    const eat2=document.getElementById("eat2");

    eat1.currentTime=0;
    eat2.currentTime=0;

    eat1.play();
    eat2.play();

    card.classList.add("shake");

    setTimeout(()=>{
        card.classList.remove("shake");
    },350);

    /* BITE MARKS */

    for(let i=0;i<3;i++){

        const bite=document.createElement("div");

        bite.className="bite";

        bite.style.left=Math.random()*250+"px";

        bite.style.top=Math.random()*250+"px";

        photoBox.appendChild(bite);

        setTimeout(()=>{
            bite.remove();
        },3000);
    }

    /* NOM TEXT */

    const texts=[
        "NOM",
        "NOM NOM",
        "MUNCH",
        "CHOMP",
        "YUM",
        "OMNOMNOM"
    ];

    for(let i=0;i<8;i++){

        const nom=document.createElement("div");

        nom.className="nom";

        nom.innerHTML=texts[Math.floor(Math.random()*texts.length)];

        nom.style.left=Math.random()*window.innerWidth+"px";

        nom.style.top=(window.innerHeight-200+Math.random()*100)+"px";

        document.body.appendChild(nom);

        setTimeout(()=>{
            nom.remove();
        },2000);
    }

    bites++;

    document.getElementById("count").innerHTML=bites;

    /* FINAL SCREEN */

    if(bites>=15){

        setTimeout(()=>{

            document.body.innerHTML=`

            <div style="
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            background:black;
            color:white;
            font-family:Fredoka;
            text-align:center;
            ">

            <h1 style="
            font-size:85px;
            animation:pulse 1s infinite;
            ">
            ALL EATEN 😭🍴
            </h1>

            <p style="
            font-size:34px;
            color:#ff8faf;
            margin-top:20px;
            ">
            mission completed
            </p>

            </div>

            <style>

            @keyframes pulse{

                0%{
                    transform:scale(1);
                }

                50%{
                    transform:scale(1.1);
                }

                100%{
                    transform:scale(1);
                }

            }

            </style>

            `;

        },700);
    }

}

</script>

</body>
</html>

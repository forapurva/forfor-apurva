
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Villain's Rewrite</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(black, darkred);
    color:white;
}

#stats{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.6);
    padding:10px;
    border-radius:10px;
}

#ui{
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.85);
    padding:20px;
}

#text{
    min-height:100px;
    font-size:20px;
}

button{
    margin:5px;
    padding:10px 20px;
    background:#b3003c;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="stats">
❤️ Romance: <span id="love">0</span><br>
🧠 Strategy: <span id="brain">0</span><br>
⚔️ Power: <span id="power">0</span>
</div>

<div id="ui">
<div id="text"></div>
<div id="choices"></div>
</div>

<script>
// stats
let love=0, brain=0, power=0;

// update stats UI
function updateStats(){
document.getElementById("love").innerText=love;
document.getElementById("brain").innerText=brain;
document.getElementById("power").innerText=power;
}

// show text
function show(text){
document.getElementById("text").innerText=text;
}

// show choices
function showChoices(arr){
let div=document.getElementById("choices");
div.innerHTML="";
arr.forEach(c=>{
let b=document.createElement("button");
b.innerText=c.text;
b.onclick=c.action;
div.appendChild(b);
});
}

// GAME START
function start(){
show("You wake up in a royal chamber.\n\nA woman stands beside you.\n\nShe speaks: \"We’ve been reincarnated… as villains. And we are destined to be killed by the protagonists.\"");

showChoices([
{text:"Accept fate", action:badEnd},
{text:"Change destiny", action:plan}
]);

updateStats();
}

// BAD END
function badEnd(){
show("You follow the original story.\n\nExecution day arrives.\n\nYou both are killed.\n\n💀 GAME OVER");

showChoices([
{text:"Restart", action:start}
]);
}

// PLAN
function plan(){
brain+=2;
love+=1;
updateStats();

show("You decide to rewrite fate.\n\nShe smiles slightly.\n\n\"Then we fight back… together.\"");

showChoices([
{text:"Build trust with her", action:bond},
{text:"Focus on gaining power", action:powerRoute}
]);
}

// ROMANCE PATH
function bond(){
love+=2;
updateStats();

show("You spend time with her.\n\nShe opens up. She was never truly evil.\n\nYour bond grows.");

showChoices([
{text:"Promise to protect her", action:romance},
{text:"Stay strategic", action:neutral}
]);
}

function romance(){
love+=2;
updateStats();

show("She looks at you differently now.\n\n\"Maybe this life… can be different.\"");

showChoices([
{text:"Face first protagonist", action:hero1}
]);
}

// NEUTRAL
function neutral(){
brain+=1;
updateStats();

show("You keep emotions controlled.\n\nNo weakness. Only strategy.");

showChoices([
{text:"Face first protagonist", action:hero1}
]);
}

// POWER ROUTE
function powerRoute(){
power+=2;
updateStats();

show("You begin gathering power in secret.\n\nAllies. Influence. Strength.");

showChoices([
{text:"Face first protagonist", action:hero1}
]);
}

// HERO 1
function hero1(){
show("The first protagonist appears.\n\nA righteous hero meant to kill you.");

showChoices([
{text:"Eliminate him early", action:killHero},
{text:"Manipulate him", action:manipulate}
]);
}

function killHero(){
power+=2;
updateStats();

show("You strike first.\n\nThe hero is defeated before he becomes strong.");

showChoices([
{text:"Next Arc", action:nextArc}
]);
}

function manipulate(){
brain+=2;
updateStats();

show("You twist the narrative.\n\nThe hero begins doubting everything.");

showChoices([
{text:"Next Arc", action:nextArc}
]);
}

// NEXT ARC
function nextArc(){
show("But this world had multiple protagonists.\n\nAnother rises… and another.\n\nThe story is changing.");

showChoices([
{text:"Deepen romance", action:finalRomance},
{text:"Expand empire", action:finalPower}
]);
}

// ENDINGS
function finalRomance(){
love+=3;
updateStats();

if(love>=6 && brain>=3){
show("❤️ TRUE END\n\nYou rewrite fate together.\n\nLove and strategy triumph.");
}else{
show("💔 BITTERSWEET END\n\nYou survive… but something is missing.");
}

showChoices([{text:"Play Again", action:start}]);
}

function finalPower(){
power+=3;
updateStats();

if(power>=6){
show("⚔️ TYRANT END\n\nYou conquer everything.\n\nBut lose her in the process.");
}else{
show("💀 FAILURE END\n\nThe story corrects itself.\n\nA new hero defeats you.");
}

showChoices([{text:"Retry", action:start}]);
}

// start game
start();
</script>

</body>
</html>
